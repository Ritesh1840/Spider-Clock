<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spider Clock | Rupam Kayal</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            background-repeat: no-repeat;
            color: #FFF;
        }

        .vline {
            position: fixed;
            top: 0;
            left: 50%;
            height: 50vh;
            width: 2px;
            background-color: #FFF;
            z-index: -1;
            opacity: 0.5;
            visibility: hidden;
        }

        .gsapWrapper {
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #wBody {
            position: relative;
            aspect-ratio: 1 / 1;
        }

        /* Responsive sizing: use the smaller dimension */
        @media (orientation: landscape) {
            #wBody {
                width: 65vh;
                height: 65vh;
            }
        }

        @media (orientation: portrait) {
            #wBody {
                width: 65vw;
                height: 65vw;
            }
        }

        #watch {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1;
            overflow: visible;
        }

        #watch svg {
            overflow: visible;
            width: 100%;
            height: 100%;
        }

        /* Digital clock */
        #digital-clock {
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
        }

        #time {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
        }

        #date {
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: rgba(255, 255, 255, 0.55);
            margin-top: 4px;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 12px;
            width: 100%;
            text-align: center;
            font-size: clamp(0.6rem, 1.8vw, 0.85rem);
            color: rgba(255, 255, 255, 0.35);
            font-family: sans-serif;
            letter-spacing: 0.05em;
            visibility: hidden;
        }

        .heart {
            display: inline-block;
        }
    </style>
</head>

    <script src='https://unpkg.com/gsap@3/dist/gsap.min.js'></script>
    <script>
        // ─── Digital clock updater ──────────────────────────────────────────
        function updateDigitalClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${h}:${m}:${s}`;

            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            document.getElementById('date').textContent =
                `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        updateDigitalClock();
        setInterval(updateDigitalClock, 1000);

        // ─── Clock hand rotation helpers ────────────────────────────────────
        function getSecRotation() {
            const now = new Date();
            return now.getSeconds() * 6;
        }
        function getMinRotation() {
            const now = new Date();
            return now.getMinutes() * 6 + now.getSeconds() * 6 / 60;
        }
        function getHrRotation() {
            const now = new Date();
            return (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
        }

        // ─── Draw spider-leg hands via SVG path ─────────────────────────────
        // We re-implement the hand shapes directly in JS so we don't need MorphSVGPlugin.
        // Each hand is a simple rotated line built as an SVG path string.
        const SEC_PATH  = "M 39.4,-15.1 40,-15 c -1.8,11.7 -5.3,33.8 -4.7,34.6 -0.8,9.4 1.6,11.6 5.9,18.6 0.6,2 -1.8,3 -2.8,1.4 L 34.7,31.8 33.9,19.6 Z";
        const MIN_PATH  = "m 39.2,-1.1 0.6,0.2 c -1.8,6.7 -4.8,19.5 -4.5,20.5 -0.8,9.4 1.6,11.6 5.9,18.6 0.6,2 -1.8,3 -2.8,1.4 L 34.7,31.8 33.9,19.6 Z";
        const HR_PATH   = "m 39.4,7.6 0.5,0.2 C 37.8,13.3 35.5,16.5 35.3,19.6 c -0.8,9.4 1.6,11.6 5.9,18.6 0.6,2 -1.8,3 -2.8,1.4 L 34.7,31.8 33.9,19.6 Z";
        const FACE_PATH = "m 37.9,43.9 h 3.6 c 0.5,0.5 -0.3,2.2 -0.7,2.4 -0.2,0 -0.3,0.1 -0.5,0.1 -0.1,-0.5 0.6,-1.4 0.4,-1.6 -0.1,-0.1 -0.7,0.3 -1.2,0.3 -0.4,0 -0.6,-0.3 -0.9,-0.4 -0.4,0 0.1,1 0.2,1.7 0,0 -0.3,-0.1 -0.5,-0.1 -0.6,-0.7 -0.8,-1.7 -0.4,-2.4 z";

        // Spider SVG coordinate center (from circle cx/cy in original)
        const CX = 39.75, CY = 39.14;

        const handSec = document.getElementById('hand-sec');
        const handMin = document.getElementById('hand-min');
        const handHr  = document.getElementById('hand-hr');
        const face    = document.getElementById('face');
        const secG    = document.getElementById('sec');
        const minG    = document.getElementById('min');
        const hrG     = document.getElementById('hr');

        // Set static paths
        handSec.setAttribute('d', SEC_PATH);
        handMin.setAttribute('d', MIN_PATH);
        handHr.setAttribute('d',  HR_PATH);
        face.setAttribute('d', FACE_PATH);

        // ─── Apply initial rotations then animate ───────────────────────────
        function applyRotation(el, deg) {
            el.setAttribute('transform', `rotate(${deg}, ${CX}, ${CY})`);
        }

        applyRotation(secG, getSecRotation());
        applyRotation(minG, getMinRotation());
        applyRotation(hrG,  getHrRotation());

        // Smooth second hand via requestAnimationFrame
        function tick() {
            applyRotation(secG, getSecRotation());
            applyRotation(minG, getMinRotation());
            applyRotation(hrG,  getHrRotation());
            requestAnimationFrame(tick);
        }
        tick();

        // ─── GSAP cog + reveal animations ───────────────────────────────────
        window.addEventListener('load', function () {
            // Reveal
            gsap.set([".gsapWrapper", ".vline", "footer"], { autoAlpha: 1 });

            // Cog rotations (purely CSS-driven via GSAP — no MorphSVG needed)
            gsap.to(".cw.t24", {
                duration: 1,
                rotation: "-=15",
                transformOrigin: "50% 50%",
                ease: "bounce",
                repeat: -1,
                repeatDelay: 1
            });
            gsap.to(".cw.t20", {
                duration: 1,
                rotation: "-=18",
                transformOrigin: "50% 50%",
                ease: "bounce",
                repeat: -1,
                repeatDelay: 1
            });
            gsap.to(".ccw.t12", {
                duration: 1,
                rotation: "+=30",
                transformOrigin: "50% 50%",
                ease: "bounce",
                repeat: -1,
                repeatDelay: 1
            });
        });
    </script>
